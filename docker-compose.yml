services:
  inkflow:
    build: .
    container_name: inkflow
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      MAX_UPLOAD_BYTES: 1073741824
      PDF_LINEARIZE_THRESHOLD_BYTES: 25165824
      INKFLOW_RENDER_CACHE_DESKTOP_PIXELS: 100000000
      INKFLOW_RENDER_CACHE_TOUCH_PIXELS: 50000000
      INKFLOW_PREFETCH_RADIUS_FAST: 4
      INKFLOW_PREFETCH_RADIUS_MEDIUM: 1
      INKFLOW_PREFETCH_RADIUS_SLOW: 0
      INKFLOW_PREVIEW_RADIUS_FAST: all
      INKFLOW_PREVIEW_RADIUS_MEDIUM: 2
      INKFLOW_PREVIEW_RADIUS_SLOW: 1
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => response.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

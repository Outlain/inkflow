services:
  inkflow:
    image: ghcr.io/outlain/inkflow:latest
    container_name: inkflow
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      MAX_UPLOAD_BYTES: 1073741824
      PDF_LINEARIZE_THRESHOLD_BYTES: 25165824
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => response.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

name: InkflowPad

options:
  bundleIdPrefix: com.inkflow
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "2"

targets:
  InkflowPad:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: InkflowPad/Sources
      - path: InkflowPad/Resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inkflow.inkflowpad
        INFOPLIST_FILE: InkflowPad/Resources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: NO
